name: Modelo scikit-learn

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  predecir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
  with:
    persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests numpy scikit-learn pandas
      - run: python modelo_robusto.py
        env:
          API_KEY: ${{ secrets.API_KEY }}
